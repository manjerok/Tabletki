<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#12121f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Таблетки">
<title>💊 Курс таблеток</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #0a0a15; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; max-width: 480px; margin: 0 auto; min-height: 100vh; }

  #header { background: #12121f; padding: 20px 16px 0; border-bottom: 1px solid #1e1e30; position: sticky; top: 0; z-index: 10; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .title { font-size: 22px; font-weight: 700; color: #f1f5f9; }
  .subtitle { font-size: 12px; color: #64748b; margin-top: 2px; }
  .day-badge { background: #1e1b4b; border: 1px solid #4338ca; color: #818cf8; border-radius: 8px; padding: 4px 10px; font-size: 13px; font-weight: 600; white-space: nowrap; }

  .progress-wrap { margin-bottom: 12px; }
  .progress-bar { height: 6px; background: #1e1e30; border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .progress-label { font-size: 12px; color: #64748b; text-align: right; }

  .tabs { display: flex; gap: 4px; }
  .tab { flex: 1; padding: 8px 0; background: transparent; border: none; border-bottom: 2px solid transparent; color: #64748b; font-size: 14px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
  .tab.active { color: #818cf8; border-bottom: 2px solid #6366f1; }

  #content { padding: 16px; }

  .time-block { margin-bottom: 20px; }
  .time-label { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .time-sub { font-size: 12px; opacity: 0.6; font-weight: 400; }
  .group { margin-bottom: 8px; }
  .delay-badge { display: inline-block; font-size: 11px; color: #94a3b8; background: #1e2030; border: 1px solid #2a2a3e; border-radius: 4px; padding: 2px 8px; margin-bottom: 6px; }

  .pill-btn { display: flex; align-items: center; width: 100%; border: 1px solid #2a2a3e; border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; cursor: pointer; text-align: left; gap: 10px; transition: all 0.15s; background: #1a1a2e; }
  .pill-btn.done { background: #1a2e1a; border-color: #22c55e; }
  .pill-btn:active { transform: scale(0.98); }
  .pill-check { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .check-empty { display: block; width: 20px; height: 20px; border: 2px solid #3a3a5e; border-radius: 5px; }
  .check-done { color: #22c55e; font-size: 20px; line-height: 1; }
  .pill-info { flex: 1; }
  .pill-name { font-size: 15px; font-weight: 600; color: #e2e8f0; transition: all 0.2s; }
  .pill-btn.done .pill-name { color: #86efac; text-decoration: line-through; opacity: 0.7; }
  .pill-dose { font-size: 12px; color: #64748b; margin-top: 1px; }
  .pill-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; opacity: 0.8; }
  .pill-btn.done .pill-dot { opacity: 0.3; }

  .reset-btn { width: 100%; background: transparent; border: 1px solid #2a2a3e; color: #64748b; padding: 10px; border-radius: 8px; font-size: 13px; cursor: pointer; margin-top: 8px; }
  .reset-btn:active { opacity: 0.7; }

  .overview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .day-card { background: #12121f; border: 1px solid #2a2a3e; border-radius: 10px; padding: 12px; cursor: pointer; text-align: left; transition: all 0.15s; width: 100%; }
  .day-card:active { transform: scale(0.97); }
  .day-card.active { background: #1e1b4b; border-color: #6366f1; }
  .day-num { font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 2px; }
  .day-pct { font-size: 22px; font-weight: 700; margin-bottom: 6px; color: #94a3b8; }
  .day-pct.complete { color: #22c55e; }
  .day-pct.missed { color: #ef4444; }
  .mini-bar { height: 4px; background: #1e1e30; border-radius: 2px; overflow: hidden; }
  .mini-fill { height: 100%; border-radius: 2px; transition: width 0.3s ease; background: #6366f1; }
  .mini-fill.complete { background: #22c55e; }
  .mini-fill.missed { background: #ef4444; }

  .install-banner { background: #1e1b4b; border: 1px solid #4338ca; border-radius: 10px; padding: 12px 14px; margin: 12px 16px; display: flex; align-items: center; gap: 10px; }
  .install-text { flex: 1; font-size: 13px; color: #a5b4fc; }
  .install-btn { background: #4338ca; border: none; color: white; border-radius: 6px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .install-close { background: none; border: none; color: #64748b; font-size: 18px; cursor: pointer; padding: 0 4px; }
</style>
</head>
<body>

<div id="header">
  <div class="header-top">
    <div>
      <div class="title">💊 Курс таблеток</div>
      <div class="subtitle" id="subtitle-text"></div>
    </div>
    <div class="day-badge" id="day-badge">День 1</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-label" id="progress-label">0% принято</div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-day" onclick="setView('day')">День</button>
    <button class="tab" id="tab-overview" onclick="setView('overview')">Весь курс</button>
  </div>
</div>

<div id="install-banner" style="display:none">
  <div class="install-banner">
    <div class="install-text">📲 Добавь на главный экран — будет работать как приложение</div>
    <button class="install-btn" id="install-btn">Установить</button>
    <button class="install-close" onclick="hideBanner()">✕</button>
  </div>
</div>

<div id="content"></div>

<script>
const COURSE_DAYS = 14;
const STORAGE_KEY = 'pill_tracker_v1';

const SCHEDULE = [
  {
    id: 'time_800', label: '🕗 8:00', sublabel: 'отдельно', color: '#94a3b8',
    groups: [
      { id: 'cm', delay: false, pills: [
        { id: 'cefaclor_800', name: 'Цефаклор', dose: '1 капс.' },
      ]},
    ],
  },
  {
    id: 'morning', label: '🌅 УТРО', sublabel: 'после еды', color: '#f97316',
    groups: [
      { id: 'm1', delay: false, pills: [
        { id: 'celebrex', name: 'Целебрекс', dose: '1 капс.' },
        { id: 'garnal', name: 'Гарнал', dose: '1 капс.' },
        { id: 'masurid_m', name: 'Масурид', dose: '4 таб.' },
      ]},
      { id: 'm2', delay: true, pills: [
        { id: 'qianlie_m', name: 'Qianlie Beixi', dose: '6 капс.' },
        { id: 'wangbi_m', name: 'Wangbi Pian', dose: '4 таб.' },
        { id: 'ruyi_m', name: 'Ruyi Zhenbao', dose: '1 таб.' },
        { id: 'zhengqing_m', name: 'Zhengqing', dose: '1 таб.' },
      ]},
    ],
  },
  {
    id: 'lunch', label: '🌤 ОБЕД', sublabel: 'после еды', color: '#eab308',
    groups: [
      { id: 'l2', delay: true, pills: [
        { id: 'qianlie_l', name: 'Qianlie Beixi', dose: '6 капс.' },
        { id: 'wangbi_l', name: 'Wangbi Pian', dose: '4 таб.' },
      ]},
    ],
  },
  {
    id: 'time_1600', label: '🕓 16:00', sublabel: 'отдельно', color: '#94a3b8',
    groups: [
      { id: 'ca', delay: false, pills: [
        { id: 'cefaclor_1600', name: 'Цефаклор', dose: '1 капс.' },
      ]},
    ],
  },
  {
    id: 'evening', label: '🌙 ВЕЧЕР', sublabel: 'после еды', color: '#6366f1',
    groups: [
      { id: 'e1', delay: false, pills: [
        { id: 'masurid_e', name: 'Масурид', dose: '4 таб.' },
      ]},
      { id: 'e2', delay: true, pills: [
        { id: 'qianlie_e', name: 'Qianlie Beixi', dose: '6 капс.' },
        { id: 'wangbi_e', name: 'Wangbi Pian', dose: '4 таб.' },
        { id: 'ruyi_e', name: 'Ruyi Zhenbao', dose: '1 таб.' },
        { id: 'zhengqing_e', name: 'Zhengqing', dose: '1 таб.' },
      ]},
    ],
  },
  {
    id: 'time_0000', label: '🕛 00:00', sublabel: 'отдельно', color: '#94a3b8',
    groups: [
      { id: 'cn', delay: false, pills: [
        { id: 'cefaclor_0000', name: 'Цефаклор', dose: '1 капс.' },
      ]},
    ],
  },
];

const ALL_PILL_IDS = SCHEDULE.flatMap(s => s.groups.flatMap(g => g.pills.map(p => p.id)));

// --- State ---
let appData = { startDate: null, days: {} };
let currentDay = 1;
let currentView = 'day';
let todayDay = 1;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) appData = JSON.parse(raw);
  } catch(e) {}
  if (!appData.startDate) {
    appData.startDate = todayStr();
    saveData();
  }
  if (!appData.days) appData.days = {};
}

function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); } catch(e) {}
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function calcTodayDay() {
  const start = new Date(appData.startDate);
  const today = new Date(todayStr());
  const diff = Math.floor((today - start) / 86400000) + 1;
  return Math.min(Math.max(diff, 1), COURSE_DAYS);
}

function getDayChecked(day) {
  return appData.days[day] || {};
}

function setChecked(day, id, val) {
  if (!appData.days[day]) appData.days[day] = {};
  appData.days[day][id] = val;
  saveData();
}

function resetDayData(day) {
  appData.days[day] = {};
  saveData();
}

// --- Render ---
function render() {
  document.getElementById('day-badge').textContent = 'День ' + currentDay;
  document.getElementById('subtitle-text').textContent = 'Начало: ' + appData.startDate + ' · ' + COURSE_DAYS + ' дней';
  document.getElementById('tab-day').className = 'tab' + (currentView === 'day' ? ' active' : '');
  document.getElementById('tab-overview').className = 'tab' + (currentView === 'overview' ? ' active' : '');

  const checked = getDayChecked(currentDay);
  const done = ALL_PILL_IDS.filter(id => checked[id]).length;
  const pct = Math.round(done / ALL_PILL_IDS.length * 100);
  const fill = document.getElementById('progress-fill');
  fill.style.width = pct + '%';
  fill.style.background = pct === 100 ? '#22c55e' : 'linear-gradient(90deg,#f97316,#6366f1)';
  document.getElementById('progress-label').textContent = pct === 100 ? '✅ День завершён!' : pct + '% принято';

  if (currentView === 'day') renderDay();
  else renderOverview();
}

function renderDay() {
  const checked = getDayChecked(currentDay);
  let html = '';
  for (const time of SCHEDULE) {
    html += `<div class="time-block">`;
    html += `<div class="time-label" style="color:${time.color}">${time.label}<span class="time-sub"> · ${time.sublabel}</span></div>`;
    for (const group of time.groups) {
      html += `<div class="group">`;
      if (group.delay) html += `<div class="delay-badge">⏱ Через 40–60 мин</div>`;
      for (const pill of group.pills) {
        const done = !!checked[pill.id];
        html += `<button class="pill-btn${done ? ' done' : ''}" onclick="togglePill('${pill.id}')">
          <div class="pill-check">${done ? '<span class="check-done">✓</span>' : '<span class="check-empty"></span>'}</div>
          <div class="pill-info">
            <div class="pill-name">${pill.name}</div>
            <div class="pill-dose">${pill.dose}</div>
          </div>
          <div class="pill-dot" style="background:${time.color}"></div>
        </button>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }
  html += `<button class="reset-btn" onclick="resetDay()">🔄 Сбросить день ${currentDay}</button>`;
  document.getElementById('content').innerHTML = html;
}

function renderOverview() {
  let html = '<div class="overview-grid">';
  for (let d = 1; d <= COURSE_DAYS; d++) {
    const data = appData.days[d] || {};
    const done = ALL_PILL_IDS.filter(id => data[id]).length;
    const pct = Math.round(done / ALL_PILL_IDS.length * 100);
    const isActive = d === currentDay;
    const isPast = d < todayDay;
    const isToday = d === todayDay;
    const pctClass = pct === 100 ? 'complete' : (isPast && pct < 100 ? 'missed' : '');
    const borderColor = isActive ? '#6366f1' : pct === 100 ? '#22c55e' : isPast ? '#ef4444' : '#2a2a3e';
    html += `<button class="day-card${isActive ? ' active' : ''}" style="border-color:${borderColor}" onclick="switchDay(${d})">
      <div class="day-num">День ${d}${isToday ? ' 📍' : ''}</div>
      <div class="day-pct ${pctClass}">${pct}%</div>
      <div class="mini-bar"><div class="mini-fill ${pctClass}" style="width:${pct}%"></div></div>
    </button>`;
  }
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

// --- Actions ---
function togglePill(id) {
  const checked = getDayChecked(currentDay);
  setChecked(currentDay, id, !checked[id]);
  render();
}

function resetDay() {
  if (confirm('Сбросить все отметки за день ' + currentDay + '?')) {
    resetDayData(currentDay);
    render();
  }
}

function switchDay(day) {
  currentDay = day;
  currentView = 'day';
  render();
  window.scrollTo(0, 0);
}

function setView(view) {
  currentView = view;
  render();
}

// --- PWA Install ---
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'block';
});

document.getElementById('install-btn').addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    hideBanner();
  }
});

function hideBanner() {
  document.getElementById('install-banner').style.display = 'none';
  localStorage.setItem('install_banner_dismissed', '1');
}

// Hide banner if already dismissed
if (localStorage.getItem('install_banner_dismissed')) {
  document.getElementById('install-banner').style.display = 'none';
}

// Check if running as installed PWA
if (window.matchMedia('(display-mode: standalone)').matches) {
  document.getElementById('install-banner').style.display = 'none';
}

// --- Init ---
loadData();
todayDay = calcTodayDay();
currentDay = todayDay;
render();
</script>

</body>
</html>
